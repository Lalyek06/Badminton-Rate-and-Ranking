<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Bracket</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #050505; color: #fff; padding: 0; margin: 0; }
        
        /* Top Navigation */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0a0a0c; border-bottom: 1px solid #1c1c1e; }
        .nav-btn { color: #ff3b30; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .header-titles { text-align: center; }
        .header-titles h1 { font-size: 1.1rem; margin: 0 0 3px 0; letter-spacing: 1px; text-transform: uppercase; }
        .header-titles p { font-size: 0.75rem; color: #888; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Round Navigator */
        .round-navigator { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #050505; }
        .round-arrow { color: #888; font-size: 1.2rem; cursor: pointer; padding: 5px 15px; user-select: none; transition: 0.2s; }
        .round-arrow:hover { color: #fff; }
        .round-name { font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; }

        /* Bracket Container */
        .bracket-container { padding: 10px 20px 80px 20px; }

        /* Match Cards */
        .match-card { background: #1c1c1e; border-radius: 12px; margin-bottom: 15px; overflow: hidden; position: relative; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
        .match-card:hover { background: #2c2c2e; }
        .match-card.active-match { border-left-color: #ff3b30; }
        
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #2c2c2e; }
        .player-row:last-child { border-bottom: none; }
        .player-info { display: flex; align-items: center; gap: 10px; font-size: 1rem; }
        .player-flag { font-size: 1.1rem; }
        .player-name { font-weight: 500; color: #aaa; transition: 0.2s; }
        
        .scores { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.05rem; color: #aaa; }
        .score-item { width: 22px; text-align: right; }
        
        /* Winner Highlights */
        .winner .player-name { color: #fff; font-weight: bold; }
        .winner .scores .score-item { color: #ff3b30; }
        .win-dot { width: 8px; height: 8px; background-color: #4caf50; border-radius: 50%; display: inline-block; margin-right: 5px; opacity: 0; }
        .winner .win-dot { opacity: 1; }

        /* Admin UI */
        .admin-box { background: #1c1c1e; margin: 20px; padding: 20px; border-radius: 12px; border: 1px solid #ffcc00; }
        .btn-primary { background: #ff3b30; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px; }
        .btn-danger { background: transparent; color: #ff3b30; border: 1px solid #ff3b30; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-top: 15px; }
        
        .player-checkbox-list { max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #3a3a3c; }
        .player-checkbox-list label { display: block; margin-bottom: 8px; color: #ddd; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1c1c1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: #aaa; cursor: pointer; }
        .score-input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-input-row input { width: 50px; background: transparent; border: none; border-bottom: 2px solid #ff3b30; color: #fff; font-size: 1.2rem; text-align: center; font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="nav-btn">❮ HOME</a>
        <div class="header-titles">
            <h1 id="tourneyTitle">TOURNAMENT</h1>
            <p>MAIN DRAW</p>
        </div>
        <span class="nav-btn" onclick="adminLogin()" id="adminLock">ADMIN</span>
    </div>

    <!-- Setup View for Admin -->
    <div id="setupView" class="admin-box" style="display: none;">
        <h3 style="color:#ffcc00; margin-top:0; text-align:center;">TOURNAMENT SETUP</h3>
        <p style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">Select players (2-16). The system will randomly draw and auto-fill 'BYE' for remaining slots.</p>
        <div class="player-checkbox-list" id="playerCheckboxes">
            <p style="color:#888;">Loading players...</p>
        </div>
        <button class="btn-primary" onclick="generateTournament()">🎲 GENERATE BRACKET</button>
    </div>

    <!-- Active Bracket View -->
    <div id="bracketView" style="display: none;">
        <div class="round-navigator">
            <div class="round-arrow" onclick="changeRound(-1)">❮</div>
            <div class="round-name" id="currentRoundName">R16</div>
            <div class="round-arrow" onclick="changeRound(1)">❯</div>
        </div>

        <div class="bracket-container" id="matchContainer">
            <!-- Matches Rendered Here -->
        </div>

        <div id="endTourneyContainer" style="padding: 0 20px; display: none;">
            <button class="btn-danger" onclick="endTournament()">🛑 CLEAR TOURNAMENT</button>
        </div>
    </div>

    <!-- Score Update Modal -->
    <div id="scoreModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeScoreModal()">×</span>
            <h3 style="text-align:center; color:#fff; margin-bottom: 20px;">UPDATE SCORE</h3>
            
            <div style="color:#aaa; font-size:0.85rem; margin-bottom:5px; text-align:center;">GAME 1 &nbsp;|&nbsp; GAME 2 &nbsp;|&nbsp; GAME 3</div>
            
            <div class="score-input-row">
                <span id="scoreP1Name" style="color:#fff; font-weight:bold; width: 40%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">P1</span>
                <input type="number" id="g1p1" min="0" max="30">
                <input type="number" id="g2p1" min="0" max="30">
                <input type="number" id="g3p1" min="0" max="30">
            </div>
            <div class="score-input-row">
                <span id="scoreP2Name" style="color:#fff; font-weight:bold; width: 40%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">P2</span>
                <input type="number" id="g1p2" min="0" max="30">
                <input type="number" id="g2p2" min="0" max="30">
                <input type="number" id="g3p2" min="0" max="30">
            </div>

            <button class="btn-primary" onclick="submitScore()">SAVE & ADVANCE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLNmEoXM7yOvm7PnccfwgkR55i8KEphP8",
            authDomain: "badminton-system-c6d93.firebaseapp.com",
            projectId: "badminton-system-c6d93",
            storageBucket: "badminton-system-c6d93.firebasestorage.app",
            messagingSenderId: "1048350552087",
            appId: "1:1048350552087:web:8c7fd591864663cf34ac52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let players = [];
        let isAdmin = false;
        let tournament = null;
        const rounds = ['R16', 'QF', 'SF', 'Final'];
        let currentRoundIdx = 0;
        let editingMatchId = null;

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('adminLock').innerText = isAdmin ? "ADMIN (🟢)" : "ADMIN";
            document.getElementById('endTourneyContainer').style.display = (isAdmin && tournament) ? 'block' : 'none';
            renderView();
        });

        window.adminLogin = async function() {
            if(isAdmin) { if(confirm("Logout from Admin Mode?")) signOut(auth); return; }
            let email = prompt("Admin Login\nEnter Email:"); if(!email) return;
            let pwd = prompt("Enter Password:"); if(!pwd) return;
            try { await signInWithEmailAndPassword(auth, email, pwd); alert("Admin Access Granted."); } 
            catch(error) { alert("Access Denied."); }
        };

        // Fetch Players
        onSnapshot(collection(db, "players"), (snapshot) => {
            players = snapshot.docs.map(doc => doc.data());
            let html = "";
            players.forEach((p) => {
                html += `<label><input type="checkbox" class="player-cb" value="${p.name}" data-flag="${p.flag}"> ${p.flag} ${p.name}</label>`;
            });
            document.getElementById('playerCheckboxes').innerHTML = html;
        });

        // Sync Tournament Data
        onSnapshot(doc(db, "tournaments", "active"), (docSnap) => {
            if (docSnap.exists()) {
                tournament = docSnap.data();
                document.getElementById('setupView').style.display = 'none';
                document.getElementById('bracketView').style.display = 'block';
                document.getElementById('endTourneyContainer').style.display = isAdmin ? 'block' : 'none';
                renderBracket();
            } else {
                tournament = null;
                document.getElementById('bracketView').style.display = 'none';
                if(isAdmin) document.getElementById('setupView').style.display = 'block';
                else document.getElementById('setupView').innerHTML = `<p style="text-align:center; color:#aaa; margin-top:50px;">No active tournament.</p>`;
            }
        });

        window.changeRound = function(dir) {
            currentRoundIdx += dir;
            if (currentRoundIdx < 0) currentRoundIdx = 0;
            if (currentRoundIdx > 3) currentRoundIdx = 3;
            renderBracket();
        };

        window.generateTournament = async function() {
            if (!isAdmin) return;
            const checkboxes = document.querySelectorAll('.player-cb:checked');
            if (checkboxes.length < 2 || checkboxes.length > 16) return alert("Please select between 2 and 16 players.");
            
            let selected = [];
            checkboxes.forEach(cb => selected.push({ name: cb.value, flag: cb.getAttribute('data-flag') }));
            
            while (selected.length < 16) { selected.push({ name: "BYE", flag: "➖" }); }
            selected = selected.sort(() => Math.random() - 0.5);

            let newTournament = { R16: [], QF: [], SF: [], Final: [] };
            
            for (let i = 0; i < 8; i++) {
                newTournament.R16.push({ id: `R16_${i}`, p1: selected[i*2], p2: selected[i*2+1], scores: { g1:['',''], g2:['',''], g3:['',''] }, winner: null });
            }
            for(let i=0; i<4; i++) newTournament.QF.push({ id:`QF_${i}`, p1:null, p2:null, scores:{g1:['',''],g2:['',''],g3:['','']}, winner:null });
            for(let i=0; i<2; i++) newTournament.SF.push({ id:`SF_${i}`, p1:null, p2:null, scores:{g1:['',''],g2:['',''],g3:['','']}, winner:null });
            newTournament.Final.push({ id:`Final_0`, p1:null, p2:null, scores:{g1:['',''],g2:['',''],g3:['','']}, winner:null });

            autoResolveByes(newTournament);

            try { await setDoc(doc(db, "tournaments", "active"), newTournament); } 
            catch (e) { alert("Error saving: " + e); }
        };

        function autoResolveByes(tData) {
            tData.R16.forEach((m, idx) => {
                if (m.winner) return;
                let nextIdx = Math.floor(idx / 2); let isP1 = (idx % 2 === 0);
                if (m.p1.name === "BYE" && m.p2.name !== "BYE") { m.winner = 2; tData.QF[nextIdx][isP1 ? 'p1' : 'p2'] = m.p2; }
                else if (m.p2.name === "BYE" && m.p1.name !== "BYE") { m.winner = 1; tData.QF[nextIdx][isP1 ? 'p1' : 'p2'] = m.p1; }
                else if (m.p1.name === "BYE" && m.p2.name === "BYE") { m.winner = 1; tData.QF[nextIdx][isP1 ? 'p1' : 'p2'] = { name: "BYE", flag: "➖" }; }
            });
            tData.QF.forEach((m, idx) => resolveNodeBye(m, idx, tData.SF));
            tData.SF.forEach((m, idx) => resolveNodeBye(m, idx, tData.Final));
        }

        function resolveNodeBye(m, idx, nextRoundArray) {
            if (m.winner || !m.p1 || !m.p2) return;
            let nextIdx = Math.floor(idx / 2); let isP1 = (idx % 2 === 0);
            if (m.p1.name === "BYE" && m.p2.name !== "BYE") { m.winner = 2; nextRoundArray[nextIdx][isP1?'p1':'p2'] = m.p2; }
            else if (m.p2.name === "BYE" && m.p1.name !== "BYE") { m.winner = 1; nextRoundArray[nextIdx][isP1?'p1':'p2'] = m.p1; }
            else if (m.p1.name === "BYE" && m.p2.name === "BYE") { m.winner = 1; nextRoundArray[nextIdx][isP1?'p1':'p2'] = {name:"BYE", flag:"➖"}; }
        }

        window.renderBracket = function() {
            if (!tournament) return;
            const roundName = rounds[currentRoundIdx];
            document.getElementById('currentRoundName').innerText = roundName;
            const matches = tournament[roundName];
            
            let html = "";
            matches.forEach((m, idx) => {
                let p1 = m.p1 || { name: 'TBD', flag: '❓' };
                let p2 = m.p2 || { name: 'TBD', flag: '❓' };
                
                let w1Class = m.winner === 1 ? 'winner' : ''; let w2Class = m.winner === 2 ? 'winner' : '';
                let isActive = (!m.winner && p1.name !== 'TBD' && p2.name !== 'TBD' && p1.name !== 'BYE' && p2.name !== 'BYE') ? 'active-match' : '';
                let clickEvt = (isAdmin && p1.name !== 'TBD' && p2.name !== 'TBD' && p1.name !== 'BYE' && p2.name !== 'BYE') ? `onclick="openScoreModal('${roundName}', ${idx})"` : '';

                html += `
                <div class="match-card ${isActive}" ${clickEvt}>
                    <div class="player-row ${w1Class}">
                        <div class="player-info"><span class="player-flag">${p1.flag}</span> <span class="player-name">${p1.name}</span></div>
                        <div class="scores"><span class="win-dot"></span> <span class="score-item">${m.scores.g1[0]}</span><span class="score-item">${m.scores.g2[0]}</span><span class="score-item">${m.scores.g3[0]}</span></div>
                    </div>
                    <div class="player-row ${w2Class}">
                        <div class="player-info"><span class="player-flag">${p2.flag}</span> <span class="player-name">${p2.name}</span></div>
                        <div class="scores"><span class="win-dot"></span> <span class="score-item">${m.scores.g1[1]}</span><span class="score-item">${m.scores.g2[1]}</span><span class="score-item">${m.scores.g3[1]}</span></div>
                    </div>
                </div>`;
            });
            document.getElementById('matchContainer').innerHTML = html;
        };

        window.openScoreModal = function(roundName, idx) {
            if (!isAdmin) return;
            const m = tournament[roundName][idx];
            editingMatchId = { round: roundName, idx: idx };
            
            document.getElementById('scoreP1Name').innerText = m.p1.name; document.getElementById('scoreP2Name').innerText = m.p2.name;
            document.getElementById('g1p1').value = m.scores.g1[0] || ''; document.getElementById('g1p2').value = m.scores.g1[1] || '';
            document.getElementById('g2p1').value = m.scores.g2[0] || ''; document.getElementById('g2p2').value = m.scores.g2[1] || '';
            document.getElementById('g3p1').value = m.scores.g3[0] || ''; document.getElementById('g3p2').value = m.scores.g3[1] || '';
            document.getElementById('scoreModal').style.display = 'flex';
        };

        window.closeScoreModal = function() { document.getElementById('scoreModal').style.display = 'none'; };

        window.submitScore = async function() {
            if (!editingMatchId) return;
            let r = editingMatchId.round; let idx = editingMatchId.idx; let m = tournament[r][idx];

            m.scores.g1 = [document.getElementById('g1p1').value, document.getElementById('g1p2').value];
            m.scores.g2 = [document.getElementById('g2p1').value, document.getElementById('g2p2').value];
            m.scores.g3 = [document.getElementById('g3p1').value, document.getElementById('g3p2').value];

            let p1Wins = 0, p2Wins = 0;
            [m.scores.g1, m.scores.g2, m.scores.g3].forEach(g => {
                let v1 = parseInt(g[0]), v2 = parseInt(g[1]);
                if (!isNaN(v1) && !isNaN(v2)) { if (v1 > v2) p1Wins++; else if (v2 > v1) p2Wins++; }
            });

            if (p1Wins > p2Wins) m.winner = 1; else if (p2Wins > p1Wins) m.winner = 2; else m.winner = null;

            if (m.winner && r !== 'Final') {
                let nextRound = r === 'R16' ? 'QF' : (r === 'QF' ? 'SF' : 'Final');
                let nextIdx = Math.floor(idx / 2); let isP1 = (idx % 2 === 0);
                tournament[nextRound][nextIdx][isP1 ? 'p1' : 'p2'] = m.winner === 1 ? m.p1 : m.p2;
                autoResolveByes(tournament);
            }

            try { await setDoc(doc(db, "tournaments", "active"), tournament); closeScoreModal(); } 
            catch(e) { alert("Error saving: " + e); }
        };

        window.endTournament = async function() {
            if(!isAdmin) return;
            if(!confirm("Are you sure? This will delete the bracket.")) return;
            try { await deleteDoc(doc(db, "tournaments", "active")); } 
            catch(e) { alert("Error: " + e); }
        };

        function renderView() { if(isAdmin && !tournament) document.getElementById('setupView').style.display = 'block'; }
    </script>
</body>
</html>
